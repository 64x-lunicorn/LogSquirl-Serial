# ============================================================================
# CI Release — Build all platforms, create GitHub Release with ZIP artifacts
#
# Triggered by pushing a tag like v0.1.0, v1.0.0-beta.1, etc.
# Can also be triggered manually via workflow_dispatch.
# ============================================================================
name: CI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Job 1: Reuse the CI build workflow ──────────────────────────────────
  build:
    uses: ./.github/workflows/ci-build.yml

  # ── Job 2: Package and release ──────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          # Strip leading 'v' for the version number
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Detect pre-release
          if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-linux-x64
          path: artifacts/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-macos-arm64
          path: artifacts/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-windows-x64
          path: artifacts/windows

      - name: Package ZIPs
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release

          # Linux
          cd artifacts/linux
          zip "../../release/logsquirl-serial-${VERSION}-linux-x64.zip" *
          cd ../..

          # macOS
          cd artifacts/macos
          zip "../../release/logsquirl-serial-${VERSION}-macos-arm64.zip" *
          cd ../..

          # Windows
          cd artifacts/windows
          zip "../../release/logsquirl-serial-${VERSION}-windows-x64.zip" *
          cd ../..

      - name: Generate checksums
        working-directory: release
        run: sha256sum *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Serial Monitor Plugin ${{ steps.version.outputs.tag }}"
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release/*.zip
            release/checksums.txt
