# ============================================================================
# CI Build — Build and test the LogSquirl Serial Monitor plugin on all platforms
# ============================================================================
name: CI Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            qt-arch: linux_gcc_64
            artifact: plugin-linux-x64
            lib-name: liblogsquirl_serial.so
            cmake-flags: ""

          - name: macOS arm64
            os: macos-15
            qt-arch: clang_64
            artifact: plugin-macos-arm64
            lib-name: liblogsquirl_serial.dylib
            cmake-flags: ""

          - name: Windows x64
            os: windows-2025
            qt-arch: win64_msvc2022_64
            artifact: plugin-windows-x64
            lib-name: logsquirl_serial.dll
            cmake-flags: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.3"
          arch: ${{ matrix.qt-arch }}
          cache: true
          modules: "qtserialport"

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Configure
        run: >
          cmake -B build -S .
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTS=ON
          ${{ matrix.cmake-flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Verify exported symbols (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "=== Exported plugin symbols ==="
          nm -gU build/${{ matrix.lib-name }} | grep logsquirl_plugin || true

      # ── macOS rpath fix ─────────────────────────────────────────────────
      # The CI Qt path baked into the dylib does not exist on user machines.
      # Replace it with @loader_path-relative paths so the plugin resolves
      # Qt frameworks from the host app's Contents/Frameworks/ directory.
      - name: Fix macOS rpaths
        if: runner.os == 'macOS'
        run: |
          DYLIB="build/${{ matrix.lib-name }}"
          echo "=== Current rpaths ==="
          otool -l "$DYLIB" | grep -A2 LC_RPATH || true

          # Remove the CI-specific Qt rpath (may fail if not present — ignore)
          for rp in $(otool -l "$DYLIB" | awk '/cmd LC_RPATH/{found=1} found && /path /{print $2; found=0}'); do
            case "$rp" in
              /Users/runner/*|/home/runner/*|/opt/hostedtoolcache/*)
                echo "Removing CI rpath: $rp"
                install_name_tool -delete_rpath "$rp" "$DYLIB" || true
                ;;
            esac
          done

          # Add rpaths for host app bundle and local (alongside plugin)
          install_name_tool -add_rpath @loader_path/../../../Frameworks "$DYLIB" 2>/dev/null || true
          install_name_tool -add_rpath @loader_path "$DYLIB" 2>/dev/null || true

          echo "=== Updated rpaths ==="
          otool -l "$DYLIB" | grep -A2 LC_RPATH || true

      - name: Verify exported symbols (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo === Exported plugin symbols ===
          dumpbin /exports build\${{ matrix.lib-name }}
          dumpbin /exports build\${{ matrix.lib-name }} | findstr logsquirl_plugin || ver >nul

      # ── macOS Code Signing & Notarization ───────────────────────────────
      - name: Import signing certificate
        if: runner.os == 'macOS' && github.event_name == 'workflow_call'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_P12_FILE }}
          p12-password: ${{ secrets.MACOS_P12_PASSWORD }}

      - name: Resolve signing identity
        if: runner.os == 'macOS' && github.event_name == 'workflow_call'
        shell: bash
        run: |
          CODESIGN_ID=$(security find-identity -v -p codesigning \
            | grep "Developer ID Application" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/' || true)
          if [ -z "$CODESIGN_ID" ]; then
            echo "::warning::No Developer ID Application identity found"
          else
            echo "Using codesign identity: $CODESIGN_ID"
          fi
          echo "CODESIGN_ID=$CODESIGN_ID" >> "$GITHUB_ENV"

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p staging
          cp build/${{ matrix.lib-name }} staging/
          cp plugin.json staging/

      # ── macOS: bundle QtSerialPort.framework alongside the plugin ───────
      # The host app does not ship QtSerialPort — the plugin must carry it.
      # We copy only the bare binary into a minimal framework directory
      # structure (no symlinks) so it survives ZIP archiving.  The dylib's
      # @loader_path rpath resolves it at runtime; QtCore/QtWidgets are
      # already loaded by the host process and reused via install-name match.
      - name: Bundle QtSerialPort framework
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # install-qt-action does not always export Qt6_DIR as a shell
          # env-var.  Extract the Qt6 lib dir from the CMake cache instead
          # (guaranteed to exist after a successful configure step).
          # Qt6_DIR points to .../lib/cmake/Qt6 — go up 3 levels to the
          # Qt prefix, then back into lib/.
          QT6_CMAKE_DIR=$(grep '^Qt6_DIR:' build/CMakeCache.txt | cut -d= -f2)
          QT_PREFIX=$(cd "$QT6_CMAKE_DIR/../../.." && pwd)
          QT_LIB="$QT_PREFIX/lib"

          echo "Qt6_DIR  = $QT6_CMAKE_DIR"
          echo "QT_PREFIX = $QT_PREFIX"
          echo "QT_LIB   = $QT_LIB"

          if [ ! -d "$QT_LIB" ]; then
            echo "::error::Qt lib dir not found at $QT_LIB"
            exit 1
          fi

          MODULE="QtSerialPort"

          # Qt6 framework layout varies: versioned (Versions/A/<lib>) or
          # flat (<framework>/<lib>).  Try both.
          FW_SRC=""
          for candidate in \
            "$QT_LIB/$MODULE.framework/Versions/A/$MODULE" \
            "$QT_LIB/$MODULE.framework/Versions/Current/$MODULE" \
            "$QT_LIB/$MODULE.framework/$MODULE"; do
            if [ -f "$candidate" ]; then
              FW_SRC="$candidate"
              break
            fi
          done

          if [ -z "$FW_SRC" ]; then
            echo "::error::QtSerialPort framework not found in $QT_LIB"
            echo "Directory listing:"
            find "$QT_LIB" -name "*SerialPort*" 2>/dev/null || true
            exit 1
          fi

          echo "Found framework binary: $FW_SRC"

          # Always create the versioned layout so rpaths work consistently
          mkdir -p "staging/$MODULE.framework/Versions/A"
          cp "$FW_SRC" "staging/$MODULE.framework/Versions/A/"

          # Strip CI-specific rpaths from the framework binary
          for rp in $(otool -l "staging/$MODULE.framework/Versions/A/$MODULE" \
                      | awk '/cmd LC_RPATH/{found=1} found && /path /{print $2; found=0}'); do
            install_name_tool -delete_rpath "$rp" \
              "staging/$MODULE.framework/Versions/A/$MODULE" 2>/dev/null || true
          done

          echo "=== Bundled $MODULE ==="
          ls -la "staging/$MODULE.framework/Versions/A/"

      - name: Sign plugin artifacts
        if: runner.os == 'macOS' && github.event_name == 'workflow_call' && env.CODESIGN_ID != ''
        shell: bash
        run: |
          # Sign framework binary first (inside-out)
          if [ -d staging/QtSerialPort.framework ]; then
            codesign --force --options runtime --timestamp \
              --sign "$CODESIGN_ID" \
              staging/QtSerialPort.framework/Versions/A/QtSerialPort
          fi

          # Sign the plugin dylib
          codesign --force --options runtime --timestamp \
            --sign "$CODESIGN_ID" \
            "staging/${{ matrix.lib-name }}"
          echo "=== Verify signatures ==="
          codesign --verify --strict --verbose=2 "staging/${{ matrix.lib-name }}"

      - name: Notarize plugin
        if: runner.os == 'macOS' && github.event_name == 'workflow_call' && env.CODESIGN_ID != ''
        shell: bash
        run: |
          # Create a temporary ZIP for notarization submission.
          # Apple records the ticket server-side — the files themselves
          # are unchanged.  Gatekeeper verifies online.
          cd staging && zip ../plugin-notarize.zip * && cd ..
          xcrun notarytool submit --wait \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            plugin-notarize.zip \
            | tee notary.log

          status=$(grep -i "status:" notary.log | tail -1 | awk '{print $NF}')
          notary_id=$(awk '$1=="id:"{id=$2} END{print id}' notary.log)

          # Fetch detailed notarization log for diagnostics
          xcrun notarytool log \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            "$notary_id" notary_log.json || true
          echo "=== Notarization log ==="
          cat notary_log.json || true

          if [ "$status" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $status"
            exit 1
          fi
          rm -f plugin-notarize.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: staging/
          if-no-files-found: error
